<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Pedidos Fazbear</title>
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/vintage.css">
    <style>
        body {
            background: #1a0a05;
            color: #f0e0d0;
            font-family: 'Special Elite', cursive;
            padding: 30px;
            min-height: 100vh;
        }
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(20, 10, 5, 0.9);
            border: 6px ridge #d4a017;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        h1 {
            font-family: 'Bowlby One SC', cursive;
            color: #ffd45c;
            text-shadow: 2px 2px #6b1a1a;
            text-align: center;
            font-size: 32px;
            margin-bottom: 10px;
        }
        .admin-sub {
            text-align: center;
            color: #b8a69b;
            margin-bottom: 25px;
            font-size: 16px;
        }
        .admin-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .btn-admin {
            display: inline-block;
            padding: 12px 25px;
            background: linear-gradient(#a00000, #500000);
            color: white;
            border: 4px ridge #d4a017;
            font-family: 'Bowlby One SC', cursive;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            transition: .3s;
        }
        .btn-admin:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
        }
        .btn-admin.secondary {
            background: linear-gradient(#2b1a10, #1a1410);
            border-color: #b8a69b;
        }
        .btn-admin.danger {
            background: linear-gradient(#8b0000, #400000);
            border-color: #ff6666;
        }
        .btn-admin.danger:hover {
            background: linear-gradient(#b00000, #600000);
        }
        .pedidos-table {
            width: 100%;
            border-collapse: collapse;
            background: #0d0a08;
            border: 3px ridge #b8a69b;
            font-size: 13px;
        }
        .pedidos-table th {
            background: #850000;
            color: #ffd45c;
            padding: 10px 8px;
            font-family: 'Bowlby One SC', cursive;
            text-align: left;
            border-bottom: 2px solid #d4a017;
        }
        .pedidos-table td {
            padding: 8px;
            border-bottom: 1px solid #3d2517;
            color: #f0e0d0;
            vertical-align: top;
        }
        .pedidos-table tr:hover td {
            background: #2b1a10;
        }
        .pedidos-table .empty {
            text-align: center;
            color: #b8a69b;
            padding: 40px 0;
            font-size: 18px;
        }
        .badge-count {
            display: inline-block;
            background: #ffd45c;
            color: #1a0a05;
            padding: 2px 12px;
            border-radius: 20px;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            margin-left: 10px;
        }
        .voltar-link {
            display: inline-block;
            margin-top: 20px;
            color: #b8a69b;
            text-decoration: none;
            font-family: 'Special Elite', cursive;
            border-bottom: 1px dashed #b8a69b;
            padding-bottom: 4px;
        }
        .voltar-link:hover {
            color: #ffd45c;
            border-color: #ffd45c;
        }
        @media (max-width: 700px) {
            .admin-container { padding: 15px; }
            .pedidos-table { font-size: 11px; }
            .pedidos-table th, .pedidos-table td { padding: 5px; }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>📋 Pedidos Recebidos</h1>
        <p class="admin-sub">
            Total: <span id="totalPedidos" class="badge-count">0</span>
        </p>

        <div class="admin-actions">
            <button class="btn-admin" onclick="exportarJSON()">📥 Exportar JSON</button>
            <button class="btn-admin danger" onclick="limparPedidos()">🗑️ Limpar Todos</button>
            <a href="paginas/contato.html" class="btn-admin secondary">← Voltar</a>
        </div>

        <div id="listaContainer">
            <!-- Tabela gerada pelo JS -->
        </div>

        <a href="index.html" class="voltar-link">🏠 Voltar ao site</a>
    </div>

    <script>
        function carregarPedidos() {
            const pedidos = JSON.parse(localStorage.getItem('pedidosFazbear')) || [];
            const container = document.getElementById('listaContainer');
            const totalSpan = document.getElementById('totalPedidos');
            totalSpan.textContent = pedidos.length;

            if (pedidos.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:#b8a69b; padding:30px;">📭 Nenhum pedido salvo ainda.</p>`;
                return;
            }

            let html = `<table class="pedidos-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Data/Hora</th>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Assunto</th>
                        <th>Mensagem</th>
                    </tr>
                </thead>
                <tbody>`;

            pedidos.forEach((p, i) => {
                html += `<tr>
                    <td>${i + 1}</td>
                    <td>${p.data}</td>
                    <td>${p.nome}</td>
                    <td>${p.email}</td>
                    <td>${p.assunto}</td>
                    <td>${p.mensagem}</td>
                </tr>`;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        function exportarJSON() {
            const pedidos = JSON.parse(localStorage.getItem('pedidosFazbear')) || [];
            if (pedidos.length === 0) {
                alert('Nenhum pedido para exportar.');
                return;
            }
            const blob = new Blob([JSON.stringify(pedidos, null, 2)], { type: 'application/json' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `pedidos_${new Date().toISOString().slice(0,10)}.json`;
            link.click();
        }

        function limparPedidos() {
            if (!confirm('⚠️ Tem certeza que deseja apagar TODOS os pedidos salvos?')) return;
            localStorage.removeItem('pedidosFazbear');
            carregarPedidos();
            document.getElementById('totalPedidos').textContent = '0';
        }

        // Carrega ao iniciar
        carregarPedidos();
    </script>
</body>
</html>
